{% load i18n %}
<nav class="sticky top-0 z-40 border-b border-white/10 bg-black/30 backdrop-blur">
    <div class="mx-auto flex max-w-6xl items-center justify-between px-6 py-4">
        <a href="/" class="font-display text-xl text-white">{{ site_profile.name|default:"Muhammadrizo Sultonov" }}</a>
        <div class="hidden items-center gap-6 text-sm font-semibold md:flex">
            <a href="/about/" class="hover:text-brand">{% trans "About" %}</a>
            <a href="/projects/" class="hover:text-brand">{% trans "Projects" %}</a>
            <a href="/blog/" class="hover:text-brand">{% trans "Blog" %}</a>
            <a href="/contact/" class="hover:text-brand">{% trans "Contact" %}</a>
        </div>
        <div class="flex items-center gap-3">
            <form action="{% url 'set_language' %}" method="post" class="flex items-center rounded-full border border-white/10 bg-white/5 p-1 text-[11px] uppercase tracking-[0.2em] text-white/70">
                {% csrf_token %}
                <input name="next" type="hidden" value="{{ request.get_full_path }}">
                <button type="submit" name="language" value="en" class="rounded-full px-3 py-1 transition {% if LANGUAGE_CODE == 'en' %}bg-white/15 text-white{% else %}hover:text-white{% endif %}">
                    EN
                </button>
                <button type="submit" name="language" value="uz" class="rounded-full px-3 py-1 transition {% if LANGUAGE_CODE == 'uz' %}bg-white/15 text-white{% else %}hover:text-white{% endif %}">
                    UZ
                </button>
            </form>
            <button class="rounded-full border border-white/20 px-4 py-2 text-xs" x-on:click="dark = !dark">{% trans "Toggle" %}</button>
            <a href="/contact/" class="rounded-full bg-brand px-4 py-2 text-xs font-semibold text-black">{% trans "Hire me" %}</a>
        </div>
    </div>
</nav>
