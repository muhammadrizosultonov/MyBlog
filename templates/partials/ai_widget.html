{% load i18n %}
<div class="fixed bottom-6 right-6 z-50">
    <button
        id="ai-toggle"
        class="group relative flex h-14 w-14 items-center justify-center rounded-2xl border border-white/10 bg-gradient-to-br from-emerald-400/90 to-cyan-400/90 text-black shadow-[0_12px_40px_rgba(0,229,255,0.25)]"
        aria-label="{% trans 'Open AI assistant' %}"
        aria-expanded="false"
    >
        <span class="absolute -inset-1 rounded-2xl bg-emerald-400/20 blur-lg opacity-0 transition group-hover:opacity-100"></span>
        <span class="relative text-sm font-bold tracking-wide">AI</span>
    </button>
    <div id="ai-panel" class="hidden mt-4 w-[22rem] rounded-[28px] border border-white/10 bg-gradient-to-br from-slate-950/90 via-slate-900/90 to-slate-900/70 p-4 shadow-[0_30px_80px_rgba(0,0,0,0.5)] backdrop-blur">
        <div class="flex items-center justify-between">
            <div>
                <div class="flex items-center gap-2 text-sm font-semibold">
                    <span class="inline-flex h-2 w-2 rounded-full bg-emerald-400"></span>
                    {% trans "AI Assistant" %}
                </div>
                <p class="mt-1 text-xs text-white/60">{% trans "Powered by your portfolio data" %}</p>
            </div>
            <span class="rounded-full border border-white/10 px-3 py-1 text-[10px] uppercase tracking-[0.2em] text-white/60">{% trans "private" %}</span>
        </div>
        <div class="mt-4 rounded-2xl border border-white/5 bg-white/[0.03] p-3">
            <div id="ai-messages" class="space-y-3 max-h-64 overflow-y-auto text-sm">
                <div class="flex justify-start">
                    <div class="max-w-[80%] rounded-2xl bg-white/10 px-3 py-2 text-white/80">
                        {% trans "Ask about skills, projects, blog, or contact." %}
                    </div>
                </div>
            </div>
        </div>
        <form
            data-ai-form
            hx-post="/api/chat/"
            hx-trigger="submit"
            hx-swap="none"
            hx-indicator="#ai-loading"
            hx-on::afterRequest="window.handleChatResponse(event)"
            hx-disabled-elt="button"
            class="mt-3 flex items-center gap-2"
            method="post"
        >
            {% csrf_token %}
            <input name="message" type="text" class="w-full rounded-full border border-white/10 bg-white/5 px-4 py-2 text-sm text-white placeholder:text-white/40 focus:border-emerald-400/60 focus:outline-none focus:ring-2 focus:ring-emerald-400/20" placeholder="{% trans 'Ask me anything...' %}" maxlength="500" required>
            <button type="submit" class="rounded-full bg-gradient-to-r from-emerald-400 to-cyan-400 px-4 py-2 text-xs font-semibold text-black shadow-sm">{% trans "Send" %}</button>
        </form>
        <div id="ai-loading" class="mt-2 text-xs text-white/60 htmx-indicator">{% trans "Thinking..." %}</div>
    </div>
</div>
